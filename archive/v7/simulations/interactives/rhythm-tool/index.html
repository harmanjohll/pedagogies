<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rhythm & Percussion — Co-Cher</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="rhythm.css">
</head>
<body>
  <div class="rhythm-app">
    <!-- Top Controls -->
    <header class="rhythm-header">
      <div class="rhythm-brand">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 2"/></svg>
        <span>Rhythm & Percussion</span>
      </div>
      <div class="rhythm-controls">
        <div class="control-group">
          <label>BPM</label>
          <input type="range" id="bpm-slider" min="40" max="200" value="100" />
          <span id="bpm-display">100</span>
        </div>
        <div class="control-group">
          <label>Beats</label>
          <select id="beats-select">
            <option value="4" selected>4/4</option>
            <option value="3">3/4</option>
            <option value="6">6/8</option>
            <option value="8">8 beats</option>
          </select>
        </div>
        <div class="control-group">
          <label>Bars</label>
          <select id="bars-select">
            <option value="2">2</option>
            <option value="4" selected>4</option>
            <option value="8">8</option>
          </select>
        </div>
        <button id="play-btn" class="btn-play" title="Play / Pause">
          <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg id="pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button id="stop-btn" class="btn-stop" title="Stop">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        </button>
        <div class="control-group">
          <label>Voice</label>
          <select id="voice-select">
            <option value="piano" selected>Piano</option>
            <option value="organ">Organ</option>
            <option value="pad">Pad / Synth</option>
          </select>
        </div>
        <button id="clear-btn" class="btn-clear" title="Clear All">Clear</button>
      </div>
    </header>

    <!-- Grid Area -->
    <main class="rhythm-main">
      <!-- Row Labels -->
      <div class="rhythm-grid" id="rhythm-grid">
        <!-- Built by JS -->
      </div>

      <!-- Legend -->
      <div class="rhythm-legend" id="rhythm-legend"></div>
    </main>

    <!-- Presets -->
    <footer class="rhythm-footer">
      <span class="footer-label">Presets:</span>
      <button class="preset-btn" data-preset="basic-4">Basic 4/4</button>
      <button class="preset-btn" data-preset="rock">Rock</button>
      <button class="preset-btn" data-preset="waltz">Waltz 3/4</button>
      <button class="preset-btn" data-preset="samba">Samba</button>
      <button class="preset-btn" data-preset="body-percussion">Body Percussion</button>
    </footer>
  </div>

  <script src="rhythm.js"></script>
</body>
</html>
