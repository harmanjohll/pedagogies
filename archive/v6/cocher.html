<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Co-Cher — Lesson Design Assistant</title>
  <meta name="description" content="AI-powered lesson planning, spatial classroom design, and E21CC framework integration for Singapore educators." />

  <!-- Installable on school laptops (no service worker — avoids stale caches on Pages) -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#000C53" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />

  <!-- Apply theme prefs before first paint (avoids a flash of the wrong theme) -->
  <script>
    try {
      if (localStorage.getItem('cocher_v6_theme_classic') === '1') {
        document.documentElement.classList.add('theme-classic');
      }
    } catch (e) { /* ignore */ }
  </script>

  <!-- Chart.js for Spatial Effectiveness Radar -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- KaTeX for LaTeX rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

  <!-- PDF.js for client-side PDF text extraction -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs" type="module"></script>
  <script type="module">
    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs';
    window.pdfjsLib = pdfjsLib;
  </script>

  <!-- SheetJS for Excel/CSV parsing (Admin One-Stop student uploads) -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <!-- JSZip for in-browser DOCX/PPTX unzip (References library — utils/doc-extract.js) -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/design-system.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />

  <!-- Favicon (inline SVG data URL) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23000C53'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='%23FFE200' font-family='system-ui' font-size='18' font-weight='700'>C</text></svg>" />
</head>
<body>
  <div id="v6-archive-banner" style="position:fixed;top:0;left:0;right:0;z-index:99999;background:#000C53;color:#FFE200;padding:8px 16px;display:flex;align-items:center;justify-content:center;gap:12px;font:600 0.8125rem 'Inter',system-ui,sans-serif;box-shadow:0 2px 8px rgba(0,0,0,0.25);">
    <span>&#128230; You are viewing Co-Cher v6 (archived). Your data here is kept separate from the current version.</span>
    <a href="../../index.html" style="color:#fff;text-decoration:underline;white-space:nowrap;">Open the latest Co-Cher &rarr;</a>
    <button onclick="this.parentElement.remove()" aria-label="Dismiss" style="background:none;border:none;color:#FFE200;cursor:pointer;font-size:1.1rem;line-height:1;padding:0 4px;">&times;</button>
  </div>
  <div id="app"></div>

  <!-- App Entry (ES Module) -->
  <script type="module" src="js/app.js"></script>

  <!--
    Co-Cher — Lesson Design Assistant
    ==================================
    Built for Singapore educators.

    To run locally:
      python3 -m http.server 8000
    Then open http://localhost:8000/app/

    ES modules require a local server (file:// won't work due to CORS).
    VS Code Live Server extension also works great.
  -->
</body>
</html>
