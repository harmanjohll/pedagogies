<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Join — Co-Cher Live</title>
<!--
  Since v8.2 the student surface lives INSIDE Co-Cher (#/join). This page
  remains only so older QR codes / bookmarked links keep working — it
  forwards ?room=CODE into the app route and gets out of the way.
-->
<style>body{font-family:system-ui,sans-serif;background:#060a22;color:#b9c2e6;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}</style>
</head>
<body>
<p>Taking you to the room…</p>
<script>
  (function () {
    var m = location.search.match(/[?&]room=([^&]+)/);
    var room = m ? decodeURIComponent(m[1]) : '';
    location.replace('../app/cocher.html#/join' + (room ? '/' + encodeURIComponent(room) : ''));
  })();
</script>
</body>
</html>
