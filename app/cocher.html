<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Co-Cher — Lesson Design Assistant</title>
  <meta name="description" content="AI-powered lesson planning, spatial classroom design, and E21CC framework integration for Singapore educators." />

  <!-- Installable on school laptops. Service worker (sw.js) is network-first for
       HTML, so a fresh Pages deploy always wins online; it only serves a cached
       shell offline. See the registration block at the end of <body>. -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#000C53" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />

  <!-- Apply theme prefs before first paint (avoids a flash of the wrong theme) -->
  <script>
    try {
      if (localStorage.getItem('cocher_theme_classic') === '1') {
        document.documentElement.classList.add('theme-classic');
      }
    } catch (e) { /* ignore */ }
  </script>

  <!-- Chart.js for Spatial Effectiveness Radar (pinned; chart.umd.js is the
       minified production UMD build shipped in the npm package) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.js"></script>

  <!-- KaTeX for LaTeX rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

  <!-- PDF.js for client-side PDF text extraction -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs" type="module"></script>
  <script type="module">
    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs';
    window.pdfjsLib = pdfjsLib;
  </script>

  <!-- SheetJS for Excel/CSV parsing (Admin One-Stop student uploads) -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <!-- JSZip for in-browser DOCX/PPTX unzip (References library — utils/doc-extract.js) -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/design-system.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />

  <!-- Favicon (inline SVG data URL) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23000C53'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='%23FFE200' font-family='system-ui' font-size='18' font-weight='700'>C</text></svg>" />
</head>
<body>
  <div id="app"></div>

  <!-- App Entry (ES Module) -->
  <script type="module" src="js/app.js"></script>

  <!-- Service worker: offline shell + network-first HTML (fresh on Pages).
       Registered after load so it never blocks boot; fails silently where the
       Service Worker API is unsupported or blocked. -->
  <script>
    if ('serviceWorker' in navigator) {
      // Capture control state now: a first install has no controller yet, an
      // update does — we only auto-reload for updates, and only once per tab
      // session (sessionStorage flag guards against reload loops).
      var hadController = !!navigator.serviceWorker.controller;
      var swReloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (swReloading || !hadController) return;
        try {
          if (sessionStorage.getItem('cocher_sw_reloaded')) return;
          sessionStorage.setItem('cocher_sw_reloaded', '1');
        } catch (e) { /* ignore */ }
        swReloading = true;
        window.location.reload();
      });
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js').then(function (reg) {
          reg.addEventListener('updatefound', function () {
            var nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', function () {
              // New version installed behind the current controller → promote it.
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                nw.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        }).catch(function () { /* SW optional — app runs fine without it */ });
      });
    }
  </script>

  <!--
    Co-Cher — Lesson Design Assistant
    ==================================
    Built for Singapore educators.

    To run locally:
      python3 -m http.server 8000
    Then open http://localhost:8000/app/

    ES modules require a local server (file:// won't work due to CORS).
    VS Code Live Server extension also works great.
  -->
</body>
</html>
